<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
    <defs>
        <linearGradient id="crystal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#a855f7" />
            <stop offset="50%" stop-color="#7c3aed" />
            <stop offset="100%" stop-color="#4f46e5" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Outer Hexagon Frame -->
    <path d="M100 15 L173.6 57.5 L173.6 142.5 L100 185 L26.4 142.5 L26.4 57.5 Z" 
          stroke="url(#crystal-grad)" 
          stroke-width="4" 
          fill="rgba(168, 85, 247, 0.05)" />

    <!-- Interior Achievement Bars -->
    <rect x="65" y="110" width="12" height="30" rx="6" fill="url(#crystal-grad)" opacity="0.4">
        <animate attributeName="height" values="20;35;20" dur="3s" repeatCount="indefinite" />
    </rect>
    <rect x="85" y="85" width="12" height="55" rx="6" fill="url(#crystal-grad)" opacity="0.7">
        <animate attributeName="height" values="40;65;40" dur="3.5s" repeatCount="indefinite" />
    </rect>
    <rect x="105" y="60" width="12" height="80" rx="6" fill="url(#crystal-grad)">
        <animate attributeName="height" values="60;90;60" dur="4s" repeatCount="indefinite" />
    </rect>
    <rect x="125" y="95" width="12" height="45" rx="6" fill="url(#crystal-grad)" opacity="0.6">
        <animate attributeName="height" values="30;55;30" dur="2.5s" repeatCount="indefinite" />
    </rect>

    <!-- The Benchmark Star (Glow) -->
    <circle cx="111" cy="55" r="8" fill="white" filter="url(#glow)">
        <animate attributeName="r" values="7;10;7" dur="2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" />
    </circle>
    
    <!-- Polished Accent Line -->
    <path d="M50 70 L80 40 L100 50" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.3" />
</svg>
